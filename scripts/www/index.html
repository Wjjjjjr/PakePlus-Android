<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老吃家测评</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 10px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            min-height: calc(100vh - 20px);
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #fff;
            color: #333;
            padding: 15px 20px;
            position: relative;
            border-bottom: 1px solid #e8e8e8;
        }
        .header h1 { font-size: 18px; font-weight: 600; text-align: center; color: #333; }
        .back-btn {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: #f0f5f5;
            border: none;
            color: #00a8a8;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: none;
            transition: background 0.3s;
        }
        .back-btn:hover { background: #e0f0f0; }
        .back-btn.show { display: flex; align-items: center; justify-content: center; }
        .menu-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: #f0f5f5;
            border: none;
            color: #00a8a8;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
        }
        .content { flex: 1; overflow-y: auto; padding: 15px; }
        .page { display: none; }
        .page.active { display: block; }
        .toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .btn-primary { background: #00bfbf; color: white; }
        .btn-primary:hover { background: #00a8a8; }
        .btn-secondary { background: #f5f5f5; color: #666; border: 1px solid #e0e0e0; }
        .btn-secondary:hover { background: #f0f0f0; }
        .btn-secondary.active { background: #e6f7f7; color: #00a8a8; border-color: #00bfbf; }
        .btn-danger { background: #ff7875; color: white; }
        .btn-danger:hover { background: #ff4d4f; }
        .btn-warning { background: #faad14; color: white; }
        .list { display: flex; flex-direction: column; gap: 10px; }
        .list-item {
            background: #fafafa;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid #f0f0f0;
        }
        .list-item:hover { background: #f5f5f5; border-color: #e0e0e0; }
        .list-item-info { flex: 1; min-width: 0; }
        .list-item-name { font-size: 15px; font-weight: 500; color: #333; }
        .list-item-meta { font-size: 12px; color: #999; margin-top: 4px; }
        .list-item-actions { display: flex; gap: 6px; }
        .canteen-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }
        .canteen-card:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }
        .canteen-info h3 {
            font-size: 15px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        .canteen-stats {
            font-size: 12px;
            color: #999;
        }
        .canteen-actions {
            display: flex;
            gap: 8px;
        }
        .canteen-action-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .canteen-edit-btn {
            background: #e6f7f7;
            color: #00a8a8;
        }
        .canteen-edit-btn:hover {
            background: #d0f0f0;
        }
        .canteen-delete-btn {
            background: #fff1f0;
            color: #ff4d4f;
        }
        .canteen-delete-btn:hover {
            background: #ffe0e0;
        }
        .action-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .edit-btn { background: #e6f7f7; color: #00a8a8; }
        .edit-btn:hover { background: #d0f0f0; }
        .delete-btn { background: #fff1f0; color: #ff4d4f; }
        .delete-btn:hover { background: #ffe0e0; }
        .fav-btn { background: #fffbe6; color: #faad14; }
        .fav-btn.active { background: #faad14; color: white; }
        .eat-btn { background: #f6ffed; color: #52c41a; }
        .empty-state { text-align: center; padding: 40px 20px; color: #bbb; }
        .empty-state-icon { font-size: 40px; margin-bottom: 10px; }
        .empty-state-text { font-size: 14px; }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            color: #333;
        }
        .modal-body { padding: 15px 20px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #333; font-size: 13px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
            background: #fafafa;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #00bfbf;
            background: #fff;
        }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .modal-footer {
            padding: 12px 20px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .avg-score {
            display: inline-block;
            background: #e6f7f7;
            color: #00a8a8;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
            margin-left: 6px;
        }
        .dish-item {
            background: #fafafa;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid #f0f0f0;
        }
        .dish-name { font-size: 15px; font-weight: 500; color: #333; margin-bottom: 6px; }
        .dish-info { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 6px; }
        .dish-score {
            display: inline-block;
            background: #00bfbf;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }
        .dish-price {
            display: inline-block;
            background: #fff7e6;
            color: #fa8c16;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }
        .dish-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }
        .tag-spicy { background: #fff1f0; color: #f5222d; }
        .tag-taste { background: #f6ffed; color: #52c41a; }
        .tag-recommend { background: #e6fffb; color: #13c2c2; }
        .tag-portion { background: #f9f0ff; color: #722ed1; }
        .tag-queue { background: #fffbe6; color: #d48806; }
        .dish-note {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed #e0e0e0;
        }
        .breadcrumb {
            padding: 8px 15px;
            background: #fafafa;
            font-size: 12px;
            color: #999;
            border-bottom: 1px solid #f0f0f0;
        }
        .breadcrumb span { color: #00a8a8; cursor: pointer; }
        .breadcrumb span:hover { text-decoration: underline; }
        .score-input-wrapper { display: flex; align-items: center; gap: 10px; }
        .score-input-wrapper input { flex: 1; }
        .score-hint { font-size: 12px; color: #bbb; }
        .sort-group { display: flex; gap: 6px; flex-wrap: wrap; }
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .search-box input { flex: 1; padding: 10px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 14px; }
        .stats-card {
            background: linear-gradient(135deg, #00bfbf 0%, #00a8a8 100%);
            border-radius: 10px;
            padding: 15px;
            color: white;
            margin-bottom: 12px;
        }
        .stats-card h3 { font-size: 14px; margin-bottom: 10px; opacity: 0.9; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stats-item { text-align: center; }
        .stats-value { font-size: 24px; font-weight: 600; }
        .stats-label { font-size: 11px; opacity: 0.8; }
        .rank-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #fafafa;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .rank-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #00bfbf;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            margin-right: 10px;
        }
        .rank-num.gold { background: #faad14; }
        .rank-num.silver { background: #8c8c8c; }
        .rank-num.bronze { background: #d48806; }
        .rank-info { flex: 1; }
        .rank-name { font-size: 14px; font-weight: 500; color: #333; }
        .rank-location { font-size: 11px; color: #999; }
        .rank-score { font-size: 16px; font-weight: 600; color: #00bfbf; }
        .random-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            color: white;
            margin-bottom: 15px;
        }
        .random-card h2 { font-size: 20px; margin-bottom: 15px; }
        .random-dish { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .random-location { font-size: 13px; opacity: 0.9; }
        .random-price { font-size: 16px; margin-top: 8px; }
        .tab-bar {
            display: flex;
            background: #fafafa;
            border-top: 1px solid #e8e8e8;
            padding: 8px 0;
        }
        .tab-item {
            flex: 1;
            text-align: center;
            padding: 8px;
            cursor: pointer;
            color: #999;
            font-size: 12px;
            transition: color 0.2s;
        }
        .tab-item.active { color: #00bfbf; }
        .tab-item-icon { font-size: 18px; margin-bottom: 2px; }
        @media (max-width: 400px) {
            .header h1 { font-size: 16px; }
            .btn { padding: 6px 12px; font-size: 12px; }
            .list-item { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" id="backBtn" onclick="goBack()">←</button>
            <h1 id="pageTitle">老吃家测评</h1>
            <button class="menu-btn" id="menuBtn" onclick="showMenuModal()">☰</button>
        </div>
        
        <div class="breadcrumb" id="breadcrumb" style="display: none;"></div>
        
        <div class="content">
            <div class="page active" id="canteenPage">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索食堂、菜品..." onkeypress="if(event.key==='Enter')showSearchResults()">
                    <button class="btn btn-secondary" onclick="clearSearch()">✕</button>
                    <button class="btn btn-primary" onclick="showSearchResults()">🔍</button>
                </div>
                <div class="toolbar">
                    <button class="btn btn-primary" onclick="showAddCanteenModal()">+ 新建</button>
                    <button class="btn btn-secondary" onclick="randomDish()">🎲 吃什么</button>
                    <button class="btn btn-secondary" onclick="showFavorites()">⭐ 收藏</button>
                </div>
                <div class="list" id="canteenList"></div>
            </div>
            
            <div class="page" id="floorPage">
                <div class="toolbar">
                    <button class="btn btn-primary" onclick="showAddFloorModal()">+ 新建楼层</button>
                </div>
                <div class="list" id="floorList"></div>
            </div>
            
            <div class="page" id="shopPage">
                <div class="toolbar">
                    <button class="btn btn-primary" onclick="showAddShopModal()">+ 新建商铺</button>
                </div>
                <div class="list" id="shopList"></div>
            </div>
            
            <div class="page" id="dishPage">
                <div class="toolbar">
                    <button class="btn btn-primary" onclick="showAddDishModal()">+ 新建菜品</button>
                    <div class="sort-group">
                        <button class="btn btn-secondary" id="sortDishScore" onclick="sortDishes('score')">评分</button>
                        <button class="btn btn-secondary" id="sortDishPrice" onclick="sortDishes('price')">价格</button>
                    </div>
                </div>
                <div class="list" id="dishList"></div>
            </div>
            
            <div class="page" id="searchPage">
                <div class="search-box">
                    <input type="text" id="searchInput2" placeholder="搜索菜品..." onkeypress="if(event.key==='Enter')showSearchResults()">
                    <button class="btn btn-secondary" onclick="clearSearch()">✕</button>
                    <button class="btn btn-primary" onclick="showSearchResults()">🔍</button>
                </div>
                <div id="searchResults"></div>
            </div>
            
            <div class="page" id="statsPage">
                <div class="stats-card">
                    <h3>📊 我的统计</h3>
                    <div class="stats-grid">
                        <div class="stats-item">
                            <div class="stats-value" id="totalDishes">0</div>
                            <div class="stats-label">菜品数</div>
                        </div>
                        <div class="stats-item">
                            <div class="stats-value" id="avgScore">0</div>
                            <div class="stats-label">平均评分</div>
                        </div>
                    </div>
                </div>
                <h3 style="font-size: 14px; margin-bottom: 10px;">🏆 评分排行 TOP5</h3>
                <div id="topDishes"></div>
            </div>
            
            <div class="page" id="favoritesPage">
                <h3 style="font-size: 14px; margin-bottom: 10px;">⭐ 我的收藏</h3>
                <div id="favoritesList"></div>
            </div>
            
            <div class="page" id="rankPage">
                <h3 style="font-size: 14px; margin-bottom: 10px;">🏆 全部菜品排行</h3>
                <div id="rankList"></div>
            </div>
        </div>
        
        <div class="tab-bar" id="tabBar">
            <div class="tab-item active" onclick="switchTab('canteen', this)">
                <div class="tab-item-icon">🏠</div>
                <div>食堂</div>
            </div>
            <div class="tab-item" onclick="switchTab('stats', this)">
                <div class="tab-item-icon">📊</div>
                <div>统计</div>
            </div>
            <div class="tab-item" onclick="switchTab('rank', this)">
                <div class="tab-item-icon">🏆</div>
                <div>排行</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header" id="modalTitle">新建</div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" id="modalConfirm">确定</button>
            </div>
        </div>
    </div>

    <script>
        let data = { canteens: [] };
        let currentLevel = 'canteen';
        let currentCanteenId = null;
        let currentFloorId = null;
        let currentShopId = null;
        let sortState = { dish: { field: 'score', asc: false } };
        let isHistoryChange = false;

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function saveData() {
            localStorage.setItem('canteenRatingData', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('canteenRatingData');
            if (saved) {
                data = JSON.parse(saved);
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatPrice(price) {
            if (price == null) return '';
            return price.toFixed(price % 1 === 0 ? 0 : 1).replace('.0', '');
        }

        function pushHistoryState() {
            const state = {
                level: currentLevel,
                canteenId: currentCanteenId,
                floorId: currentFloorId,
                shopId: currentShopId
            };
            history.pushState(state, '', '');
        }

        function restoreState(state) {
            if (!state) {
                goToCanteen();
                return;
            }
            currentLevel = state.level || 'canteen';
            currentCanteenId = state.canteenId || null;
            currentFloorId = state.floorId || null;
            currentShopId = state.shopId || null;
            
            if (currentLevel === 'canteen') {
                showPage('canteen');
                renderCanteens();
            } else if (currentLevel === 'floor') {
                showPage('floor');
                renderFloors();
            } else if (currentLevel === 'shop') {
                showPage('shop');
                renderShops();
            } else if (currentLevel === 'dish') {
                showPage('dish');
                renderDishes();
            } else if (currentLevel === 'search') {
                showPage('search');
            } else if (currentLevel === 'favorites') {
                showPage('favorites');
                renderFavorites();
            } else if (currentLevel === 'stats') {
                switchTab('stats');
            } else if (currentLevel === 'rank') {
                switchTab('rank');
            }
        }

        function showModal(title, bodyHtml, onConfirm) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = bodyHtml;
            document.getElementById('modalOverlay').classList.add('show');
            document.getElementById('modalConfirm').onclick = onConfirm;
            
            // 自动聚焦第一个输入框
            setTimeout(() => {
                const firstInput = document.querySelector('#modalBody input, #modalBody textarea, #modalBody select');
                if (firstInput) {
                    firstInput.focus();
                    if (firstInput.type === 'text' || firstInput.tagName === 'TEXTAREA') {
                        firstInput.select();
                    }
                }
            }, 50);
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        // ESC键关闭模态框
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('modalOverlay').classList.contains('show')) {
                closeModal();
            }
        });

        function showMenuModal() {
            showModal('菜单', `
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button class="btn btn-secondary" onclick="closeModal();showExportModal()">📤 导出数据</button>
                    <button class="btn btn-secondary" onclick="closeModal();showImportModal()">📥 导入数据</button>
                    <button class="btn btn-secondary" onclick="closeModal();switchTab('favorites')">⭐ 我的收藏</button>
                    <button class="btn btn-secondary" onclick="closeModal();randomDish()">🎲 今天吃什么</button>
                </div>
            `, () => closeModal());
            document.getElementById('modalConfirm').textContent = '关闭';
        }

        function switchTab(tab, element) {
            if (isHistoryChange) {
                isHistoryChange = false;
            } else {
                pushHistoryState();
            }
            
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            if (element) {
                element.classList.add('active');
            } else {
                const tabs = document.querySelectorAll('.tab-item');
                const tabNames = ['canteen', 'stats', 'rank'];
                const index = tabNames.indexOf(tab);
                if (index >= 0 && tabs[index]) {
                    tabs[index].classList.add('active');
                }
            }
            
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(tab + 'Page').classList.add('active');
            
            document.getElementById('backBtn').classList.remove('show');
            document.getElementById('breadcrumb').style.display = 'none';
            document.getElementById('tabBar').style.display = 'flex';
            document.getElementById('pageTitle').textContent = 
                tab === 'canteen' ? '老吃家测评' :
                tab === 'stats' ? '统计' : '排行榜';
            
            currentLevel = tab;
            
            if (tab === 'stats') renderStats();
            if (tab === 'rank') renderRank();
            if (tab === 'favorites') renderFavorites();
            if (tab === 'canteen') renderCanteens();
        }

        function getAllDishes() {
            let dishes = [];
            data.canteens.forEach(canteen => {
                canteen.floors?.forEach(floor => {
                    floor.shops?.forEach(shop => {
                        shop.dishes?.forEach(dish => {
                            dishes.push({
                                ...dish,
                                canteenName: canteen.name,
                                floorName: floor.name,
                                shopName: shop.name,
                                canteenId: canteen.id,
                                floorId: floor.id,
                                shopId: shop.id
                            });
                        });
                    });
                });
            });
            return dishes;
        }

        function renderCanteens() {
            const list = document.getElementById('canteenList');
            if (data.canteens.length === 0) {

                return `

        function renderShops() {

                    </div>

        function renderDishes() {
            const canteen = data.canteens.find(c => c.id === currentCanteenId);
            const floor = canteen?.floors?.find(f => f.id === currentFloorId);
            const shop = floor?.shops?.find(s => s.id === currentShopId);
            const list = document.getElementById('dishList');
            
            if (!shop || !shop.dishes || shop.dishes.length === 0) {
                list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🍜</div><div class="empty-state-text">暂无菜品</div></div>`;
                return;
            }
            
            let dishes = [...shop.dishes];
            if (sortState.dish.field === 'score') {
                dishes.sort((a, b) => sortState.dish.asc ? a.score - b.score : b.score - a.score);
            } else if (sortState.dish.field === 'price') {
                dishes.sort((a, b) => {
                    const pa = a.price || 999;
                    const pb = b.price || 999;
                    return sortState.dish.asc ? pa - pb : pb - pa;
                });
            }
            
            updateSortButtons();
            list.innerHTML = dishes.map(d => renderDishItem(d, shop)).join('');
        }

        function renderDishItem(dish, shop) {
            const tags = [];
            if (dish.spicy) tags.push(`<span class="tag tag-spicy">${'🌶️'.repeat(dish.spicy)}</span>`);
            if (dish.taste) tags.push(`<span class="tag tag-taste">${dish.taste}</span>`);
            if (dish.recommend) tags.push(`<span class="tag tag-recommend">${dish.recommend}</span>`);
            if (dish.portion) tags.push(`<span class="tag tag-portion">${dish.portion}</span>`);
            if (dish.queueTime) tags.push(`<span class="tag tag-queue">排队${dish.queueTime}分钟</span>`);
            
            return `
                <div class="dish-item">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div class="dish-name">${escapeHtml(dish.name)} ${dish.favorite ? '⭐' : ''}</div>
                        <div class="list-item-actions">
                            <button class="action-btn fav-btn ${dish.favorite ? 'active' : ''}" onclick="toggleFavorite('${dish.id}')">★</button>
                            <button class="action-btn edit-btn" onclick="editDish('${dish.id}')">✎</button>
                            <button class="action-btn delete-btn" onclick="deleteDish('${dish.id}')">✕</button>
                        </div>
                    </div>
                    <div class="dish-info">
                        <span class="dish-score">评分 ${dish.score}</span>
                        ${dish.price ? `<span class="dish-price">¥${formatPrice(dish.price)}</span>` : ''}
                    </div>
                    ${tags.length > 0 ? `<div class="dish-tags">${tags.join('')}</div>` : ''}
                    ${dish.note ? `<div class="dish-note">${escapeHtml(dish.note)}</div>` : ''}
                </div>
            `;
        }

        function sortDishes(field) {
            if (sortState.dish.field === field) {
                sortState.dish.asc = !sortState.dish.asc;
            } else {
                sortState.dish.field = field;
                sortState.dish.asc = false;
            }
            renderDishes();
        }

        function updateSortButtons() {
            document.getElementById('sortDishScore').classList.remove('active');
            document.getElementById('sortDishPrice').classList.remove('active');
            
            const activeBtn = sortState.dish.field === 'score' ? 
                document.getElementById('sortDishScore') : 
                document.getElementById('sortDishPrice');
            
            if (activeBtn) {
                activeBtn.classList.add('active');
                const arrow = sortState.dish.asc ? '↑' : '↓';
                activeBtn.textContent = (sortState.dish.field === 'score' ? '评分' : '价格') + ' ' + arrow;
            }
        }

        function showPage(level) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(level + 'Page').classList.add('active');
            
            const backBtn = document.getElementById('backBtn');
            const breadcrumb = document.getElementById('breadcrumb');
            const tabBar = document.getElementById('tabBar');
            
            if (level === 'canteen') {
                backBtn.classList.remove('show');
                breadcrumb.style.display = 'none';
                tabBar.style.display = 'flex';
                document.getElementById('pageTitle').textContent = '老吃家测评';
            } else if (level === 'search' || level === 'favorites') {
                backBtn.classList.add('show');
                breadcrumb.style.display = 'block';
                tabBar.style.display = 'none';
                updateBreadcrumb();
            } else {
                backBtn.classList.add('show');
                breadcrumb.style.display = 'block';
                tabBar.style.display = 'none';
                updateBreadcrumb();
            }
            currentLevel = level;
        }

        function updateBreadcrumb() {
            const breadcrumb = document.getElementById('breadcrumb');
            if (currentLevel === 'search') {
                breadcrumb.innerHTML = '<span onclick="goToCanteen()">返回首页</span>';
                document.getElementById('pageTitle').textContent = '搜索结果';
                return;
            }
            if (currentLevel === 'favorites') {
                breadcrumb.innerHTML = '<span onclick="goToCanteen()">返回首页</span>';
                document.getElementById('pageTitle').textContent = '我的收藏';
                return;
            }
            const canteen = data.canteens.find(c => c.id === currentCanteenId);
            const floor = canteen?.floors?.find(f => f.id === currentFloorId);
            const shop = floor?.shops?.find(s => s.id === currentShopId);
            
            let html = '<span onclick="goToCanteen()">食堂列表</span>';
            if (currentCanteenId && canteen) {
                html += ' > <span onclick="goToFloor()">' + escapeHtml(canteen.name) + '</span>';
                document.getElementById('pageTitle').textContent = canteen.name;
            }
            if (currentFloorId && floor) {
                html += ' > <span onclick="goToShop()">' + escapeHtml(floor.name) + '</span>';
                document.getElementById('pageTitle').textContent = floor.name;
            }
            if (currentShopId && shop) {
                html += ' > ' + escapeHtml(shop.name);
                document.getElementById('pageTitle').textContent = shop.name;
            }
            breadcrumb.innerHTML = html;
        }

        function goBack() {
            if (history.length > 1) {

            } else {
                switch (currentLevel) {
                    case 'floor': goToCanteen(); break;
                    case 'shop': goToFloor(); break;
                    case 'dish': goToShop(); break;
                    case 'search':
                    case 'favorites':
                    case 'stats':
                    case 'rank':
                        switchTab('canteen');

                    default:

                saveData();
                renderDishes();
                closeModal();
            });
        }

        function deleteDish(id) {
            if (!confirm('确定删除？')) return;
            const canteen = data.canteens.find(c => c.id === currentCanteenId);
            const floor = canteen.floors.find(f => f.id === currentFloorId);
            const shop = floor.shops.find(s => s.id === currentShopId);
            shop.dishes = shop.dishes.filter(d => d.id !== id);
            saveData();
            renderDishes();
        }

        function toggleFavorite(id) {
            const allDishes = getAllDishes();
            const dishInfo = allDishes.find(d => d.id === id);
            if (!dishInfo) return;
            
            const canteen = data.canteens.find(c => c.id === dishInfo.canteenId);
            const floor = canteen.floors.find(f => f.id === dishInfo.floorId);
            const shop = floor.shops.find(s => s.id === dishInfo.shopId);
            const dish = shop.dishes.find(d => d.id === id);
            dish.favorite = !dish.favorite;
            saveData();
            renderDishes();
        }

        function randomDish() {
            const dishes = getAllDishes();
            if (dishes.length === 0) {
                alert('还没有菜品数据，先添加一些菜品吧！');
                return;
            }
            const randomIndex = Math.floor(Math.random() * dishes.length);
            const dish = dishes[randomIndex];
            
            showModal('🎲 今天吃什么', `
                <div class="random-card">
                    <h2>就吃这个！</h2>
                    <div class="random-dish">${escapeHtml(dish.name)}</div>
                    <div class="random-location">📍 ${escapeHtml(dish.canteenName)} · ${escapeHtml(dish.shopName)}</div>
                    ${dish.price ? `<div class="random-price">💰 ¥${formatPrice(dish.price)}</div>` : ''}
                    <div style="margin-top: 10px; font-size: 14px;">评分：${dish.score} 分</div>
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="closeModal();randomDish()">🎲 换一个</button>
            `, () => closeModal());
            document.getElementById('modalConfirm').textContent = '好的';
        }

        function clearSearch() {
            const input1 = document.getElementById('searchInput');
            const input2 = document.getElementById('searchInput2');
            if (input1) input1.value = '';
            if (input2) input2.value = '';
            if (currentLevel === 'search') {
                goBack();
            }
        }

        function handleSearch() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!keyword) return;
            showSearchResults();
        }

        function handleSearch2() {
            showSearchResults();
        }

        function showSearchResults() {
            if (isHistoryChange) {
                isHistoryChange = false;
            } else {
                pushHistoryState();
            }
            
            const input1 = document.getElementById('searchInput');
            const input2 = document.getElementById('searchInput2');
            const keyword = ((input1?.value || '') + (input2?.value || '')).trim().toLowerCase();
            if (!keyword) {
                document.getElementById('searchResults').innerHTML = `<div class="empty-state"><div class="empty-state-text">输入关键词搜索</div></div>`;
                showPage('search');
                return;
            }
            
            const dishes = getAllDishes().filter(d => 
                d.name.toLowerCase().includes(keyword) ||
                d.canteenName.toLowerCase().includes(keyword) ||
                d.shopName.toLowerCase().includes(keyword)
            );
            
            const results = document.getElementById('searchResults');
            if (dishes.length === 0) {
                results.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">没有找到相关菜品</div></div>`;
            } else {
                results.innerHTML = dishes.map(d => `
                    <div class="dish-item" onclick="navigateToDish('${d.canteenId}', '${d.floorId}', '${d.shopId}')">
                        <div class="dish-name">${escapeHtml(d.name)}</div>
                        <div class="dish-info">
                            <span class="dish-score">${d.score}分</span>
                            ${d.price ? `<span class="dish-price">¥${formatPrice(d.price)}</span>` : ''}
                        </div>
                        <div class="list-item-meta">${escapeHtml(d.canteenName)} · ${escapeHtml(d.shopName)}</div>
                    </div>
                `).join('');
            }
            showPage('search');
        }

        function navigateToDish(canteenId, floorId, shopId) {
            if (isHistoryChange) {
                isHistoryChange = false;
            } else {
                pushHistoryState();
            }
            currentCanteenId = canteenId;
            currentFloorId = floorId;
            currentShopId = shopId;
            showPage('dish');
            renderDishes();
        }

        function showFavorites() {
            if (isHistoryChange) {
                isHistoryChange = false;
            } else {
                pushHistoryState();
            }
            renderFavorites();
            showPage('favorites');
            document.getElementById('backBtn').classList.add('show');
        }

        function renderFavorites() {
            const dishes = getAllDishes().filter(d => d.favorite);
            const list = document.getElementById('favoritesList');
            
            if (dishes.length === 0) {
                list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⭐</div><div class="empty-state-text">还没有收藏的菜品</div></div>`;
                return;
            }
            
            list.innerHTML = dishes.map(d => `
                <div class="dish-item" onclick="navigateToDish('${d.canteenId}', '${d.floorId}', '${d.shopId}')">
                    <div class="dish-name">${escapeHtml(d.name)} ⭐</div>
                    <div class="dish-info">
                        <span class="dish-score">${d.score}分</span>
                        ${d.price ? `<span class="dish-price">¥${formatPrice(d.price)}</span>` : ''}
                    </div>
                    <div class="list-item-meta">${escapeHtml(d.canteenName)} · ${escapeHtml(d.shopName)}</div>
                </div>
            `).join('');
        }

        function renderStats() {
            const dishes = getAllDishes();
            const totalDishes = dishes.length;
            const avgScore = totalDishes > 0 ? (dishes.reduce((sum, d) => sum + d.score, 0) / totalDishes).toFixed(1) : 0;
            
            document.getElementById('totalDishes').textContent = totalDishes;
            document.getElementById('avgScore').textContent = avgScore;
            
            const topDishes = [...dishes].sort((a, b) => b.score - a.score).slice(0, 5);
            document.getElementById('topDishes').innerHTML = topDishes.map((d, i) => `
                <div class="rank-item">
                    <div class="rank-num ${i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : ''}">${i + 1}</div>
                    <div class="rank-info">
                        <div class="rank-name">${escapeHtml(d.name)}</div>
                        <div class="rank-location">${escapeHtml(d.canteenName)} · ${escapeHtml(d.shopName)}</div>
                    </div>
                    <div class="rank-score">${d.score}</div>
                </div>
            `).join('') || '<div class="empty-state"><div class="empty-state-text">暂无数据</div></div>';
        }

        function renderRank() {
            const dishes = getAllDishes().sort((a, b) => b.score - a.score);
            const list = document.getElementById('rankList');
            
            if (dishes.length === 0) {
                list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🏆</div><div class="empty-state-text">暂无菜品数据</div></div>`;
                return;
            }
            
            list.innerHTML = dishes.map((d, i) => `
                <div class="rank-item" onclick="navigateToDish('${d.canteenId}', '${d.floorId}', '${d.shopId}')">
                    <div class="rank-num ${i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : ''}">${i + 1}</div>
                    <div class="rank-info">
                        <div class="rank-name">${escapeHtml(d.name)}</div>
                        <div class="rank-location">${escapeHtml(d.canteenName)} · ${escapeHtml(d.shopName)}</div>
                    </div>
                    <div class="rank-score">${d.score}</div>
                </div>
            `).join('');
        }

        function showExportModal() {
            if (data.canteens.length === 0) {
                alert('暂无数据可导出');
                return;
            }
            const jsonStr = JSON.stringify({ version: '2.0', exportTime: new Date().toISOString(), data });
            
            showModal('📤 导出数据', `
                <div class="form-group">
                    <label>复制以下文本保存：</label>
                    <textarea id="exportText" style="height: 150px; font-size: 10px; word-break: break-all;" readonly>${escapeHtml(jsonStr)}</textarea>
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="copyExportData()">📋 一键复制</button>
            `, () => closeModal());
            document.getElementById('modalConfirm').textContent = '关闭';
        }

        function copyExportData() {
            const textarea = document.getElementById('exportText');
            if (navigator.clipboard) {
                navigator.clipboard.writeText(textarea.value).then(() => alert('✅ 已复制！')).catch(() => fallbackCopy(textarea));
            } else {
                fallbackCopy(textarea);
            }
        }

        function fallbackCopy(textarea) {
            textarea.select();
            document.execCommand('copy');
            alert('✅ 已复制！');
        }

        function showImportModal() {
            showModal('📥 导入数据', `
                <div class="form-group">
                    <label>粘贴数据：</label>
                    <textarea id="importText" style="height: 150px; font-size: 10px;" placeholder="粘贴导出的数据..."></textarea>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-secondary" style="flex: 1;" onclick="document.getElementById('importText').value=''">清空</button>
                    <button class="btn btn-primary" style="flex: 1;" onclick="doImport()">导入</button>
                </div>
            `, () => closeModal());
            document.getElementById('modalConfirm').style.display = 'none';
        }

        function doImport() {
            const text = document.getElementById('importText').value.trim();
            if (!text) { alert('请粘贴数据'); return; }
            
            try {
                const imported = JSON.parse(text);
                let importedData = imported.data || imported;
                
                if (!importedData.canteens) throw new Error('格式错误');
                
                if (data.canteens.length > 0 && !confirm('导入将覆盖现有数据，继续？')) return;
                
                data = importedData;
                saveData();
                renderCanteens();
                closeModal();
                alert('✅ 导入成功！');
            } catch (e) {
                alert('❌ 导入失败：数据格式错误');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            renderCanteens();
            
            // 初始化历史记录
            history.replaceState({
                level: currentLevel,
                canteenId: currentCanteenId,
                floorId: currentFloorId,
                shopId: currentShopId
            }, '', '');
        });

        window.addEventListener('popstate', (e) => {
            isHistoryChange = true;
            restoreState(e.state);
        });

        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) closeModal();
        });
    </script>
</body>
</html>
